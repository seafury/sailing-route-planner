<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sailing Route Planner</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet-routing-machine@3.2.12/dist/leaflet-routing-machine.css" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <div id="app">
    <header>
      <h1>⛵ Sailing Route Planner</h1>
      <div id="tide-info" class="tide-badge">Fetching tides...</div>
    </header>
    <div id="map"></div>
    <div id="controls">
      <button id="btn-set-start" class="btn btn-primary">📍 Set Start</button>
      <button id="btn-set-between" class="btn btn-secondary">🔗 Between</button>
      <button id="btn-set-end" class="btn btn-secondary">🎯 Set End</button>
      <button id="btn-route" class="btn btn-accent">🧭 Plan Route</button>
      <button id="btn-swell-overlay" class="btn btn-outline">🌊 Toggle Swell Overlay</button>
      <button id="btn-clear" class="btn btn-danger">🗑️ Clear</button>
      <button id="btn-today" class="btn btn-outline">📅 Today's Tides</button>
      <div class="latlon-form">
        <input id="input-lat" type="number" step="any" placeholder="Lat (e.g. -33.92)" />
        <input id="input-lon" type="number" step="any" placeholder="Lon (e.g. 18.42)" />
        <button id="btn-add-latlon" class="btn btn-secondary">➕ Add Lat/Lon</button>
      </div>
      <div class="speed-form">
        <input id="input-speed-knots" type="number" step="0.1" min="0.1" placeholder="Speed (kn)" />
        <button id="btn-set-speed" class="btn btn-secondary">⛵ Set Speed</button>
      </div>
    </div>
    <div id="sidebar">
      <h3>Route Details</h3>
      <div id="route-details">
        <p class="muted">Click the map to set waypoints. Routes auto-calculate with tide overlays.</p>
      </div>
      <h3>Tide Forecast</h3>
      <div id="tide-forecast">
        <p class="muted">Loading tide data...</p>
      </div>
    </div>
  </div>
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="https://unpkg.com/leaflet-routing-machine@3.2.12/dist/leaflet-routing-machine.min.js"></script>
  <script src="js/config.js"></script>
  <script src="js/tides.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
