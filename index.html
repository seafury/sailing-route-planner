<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sailing Route Planner</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet-routing-machine@3.2.12/dist/leaflet-routing-machine.css" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <div id="app">
    <header>
      <h1>⛵ Sailing Route Planner</h1>
    </header>
    <div id="map"></div>
    <div id="controls">
      <button id="btn-route" class="btn btn-accent">🧭 Plan Route</button>
      <div class="speed-control">
        <input id="input-speed-knots" type="number" step="0.1" min="0.1" value="6.0" />
        <span class="unit">kn</span>
        <button id="btn-set-speed" class="btn btn-secondary">Set</button>
      </div>
      <button id="btn-waves" class="btn btn-outline">🌊 Waves</button>
      <button id="btn-wind" class="btn btn-outline">🌬️ Wind</button>
      <button id="btn-clear" class="btn btn-danger">🗑️ Clear</button>
    </div>
    <div id="sidebar">
      <div class="sidebar-section">
        <h3>📍 Manual Waypoint</h3>
        <div class="coord-inputs">
          <input id="input-lat" type="text" placeholder="Lat (e.g. -33.9)" />
          <input id="input-lon" type="text" placeholder="Lon (e.g. 18.4)" />
          <button id="btn-add-coord" class="btn btn-secondary">Add Point</button>
        </div>
      </div>
      <div class="sidebar-section">
        <h3>🏁 Route Summary</h3>
      <div id="route-summary">
        <p class="muted">Click the map to set waypoints. Routes auto-calculate with nautical distance.</p>
      </div>
      <div id="marine-weather">
        <!-- Marine weather cards will be injected here -->
      </div>
      <div id="tide-forecast">
        <!-- Tide data will be injected here -->
      </div>
    </div>
  </div>

  <!-- Leaflet and Plugins -->
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="https://unpkg.com/leaflet-routing-machine@3.2.12/dist/leaflet-routing-machine.js"></script>
  
  <!-- App Logic -->
  <script src="js/config.js"></script>
  <script src="js/tides.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
